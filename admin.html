<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rylo Labz Admin Publisher</title>
  <link rel="icon" href="/logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=5" />
  <style>
    body { background: var(--bg-2); }
    .admin-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: clamp(48px, 8vw, 96px) var(--s-6) var(--s-20);
    }
    .admin-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      padding: var(--s-10);
    }
    .admin-card h1 {
      font-family: var(--font-serif);
      font-size: clamp(30px, 4vw, 44px);
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin: 0 0 var(--s-2);
    }
    .admin-card .sub { color: var(--text-muted); margin: 0 0 var(--s-8); font-size: var(--fs-body); }

    form.grid { display: grid; gap: var(--s-4); }
    label {
      display: block;
      font-size: var(--fs-small);
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 6px;
      letter-spacing: -0.005em;
    }
    input, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      background: #fff;
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
      font-size: var(--fs-body);
      transition: border-color .15s var(--ease-out), box-shadow .15s var(--ease-out);
    }
    input:focus, textarea:focus {
      outline: 0;
      border-color: var(--c-brand-purple);
      box-shadow: 0 0 0 3px rgba(139,92,246,.18);
    }
    textarea { min-height: 220px; resize: vertical; font-family: var(--font-mono); font-size: var(--fs-small); line-height: 1.6; }
    .row { display: grid; gap: var(--s-3); grid-template-columns: 1fr 1fr; }
    @media (max-width: 700px) { .row { grid-template-columns: 1fr; } }

    .admin-submit {
      margin-top: var(--s-4);
      justify-self: start;
    }

    #result {
      margin-top: var(--s-6);
      padding: var(--s-4);
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      color: var(--text-muted);
      white-space: pre-wrap;
      font-family: var(--font-mono);
      font-size: var(--fs-small);
      min-height: 44px;
      line-height: 1.6;
    }
    #result:empty { display: none; }
    #result a { color: var(--c-brand-purple); border-bottom: 1px solid currentColor; }
  </style>
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a href="/" class="brand">
                <span>Rylo Labz</span>
      </a>
      <nav class="nav-links" aria-label="Primary">
        <a href="/#resources">Resources</a>
      </nav>
    </div>
  </header>

  <main class="admin-wrap">
    <section class="admin-card">
      <h1>Publisher</h1>
      <p class="sub">Publish an article to production. Requires the admin token.</p>

      <form id="article-form" class="grid">
        <div>
          <label for="token">Admin Token</label>
          <input id="token" name="token" type="password" autocomplete="off" required />
        </div>
        <div>
          <label for="title">Title</label>
          <input id="title" name="title" required />
        </div>
        <div>
          <label for="summary">Summary</label>
          <input id="summary" name="summary" required />
        </div>
        <div class="row">
          <div>
            <label for="slug">Slug <span style="color: var(--text-subtle); font-weight: 400;">(optional)</span></label>
            <input id="slug" name="slug" placeholder="auto-from-title" />
          </div>
          <div>
            <label for="author">Author</label>
            <input id="author" name="author" value="Rylo Labz" />
          </div>
        </div>
        <div>
          <label for="content">Article content</label>
          <textarea id="content" name="content" required></textarea>
        </div>
        <button type="submit" class="btn btn--brand btn--lg admin-submit">
          <span>Publish article</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </button>
      </form>
      <div id="result"></div>
    </section>
  </main>

  <script>
    const form = document.getElementById('article-form');
    const result = document.getElementById('result');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      result.textContent = 'Publishing…';

      const data = new FormData(form);
      const payload = {
        title: data.get('title'),
        summary: data.get('summary'),
        slug: data.get('slug'),
        author: data.get('author'),
        content: data.get('content')
      };

      try {
        const response = await fetch('/api/articles', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${String(data.get('token') || '')}`
          },
          body: JSON.stringify(payload)
        });

        const body = await response.json();
        if (!response.ok) {
          result.textContent = `Error: ${body.error || 'Failed to publish'}`;
          return;
        }

        const slug = body.article.slug;
        result.innerHTML = `Published.\nOpen: <a href="/article?slug=${encodeURIComponent(slug)}">/article?slug=${slug}</a>`;
        form.reset();
      } catch (error) {
        result.textContent = 'Error: network or server issue while publishing.';
      }
    });
  </script>
</body>
</html>
