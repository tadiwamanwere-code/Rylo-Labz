<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rylo Labz Admin Publisher</title>
  <style>
    :root {
      --bg: #090d13;
      --card: #101722;
      --text: #f4f7fb;
      --muted: #91a0b3;
      --accent: #5de7d7;
      --border: #243041;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Space Grotesk", system-ui, sans-serif;
      background: radial-gradient(circle at 20% 0%, #172638 0, #090d13 55%);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px;
    }
    .wrap { max-width: 900px; margin: 0 auto; }
    .card {
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card);
      padding: 22px;
    }
    h1 { margin-top: 0; margin-bottom: 8px; }
    p { color: var(--muted); margin-top: 0; }
    .grid { display: grid; gap: 14px; }
    label { font-weight: 600; font-size: 14px; }
    input, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0d1420;
      color: var(--text);
      padding: 12px;
      font: inherit;
    }
    textarea { min-height: 190px; resize: vertical; }
    .row { display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
    button {
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #07221f;
      padding: 13px 18px;
      font-weight: 700;
      cursor: pointer;
    }
    #result {
      margin-top: 14px;
      color: var(--muted);
      white-space: pre-wrap;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 13px;
    }
    @media (max-width: 760px) {
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Rylo Labz Publisher</h1>
      <p>Publish articles directly to production using your Vercel admin token.</p>

      <form id="article-form" class="grid">
        <div>
          <label for="token">Admin Token</label>
          <input id="token" name="token" type="password" autocomplete="off" required />
        </div>
        <div>
          <label for="title">Title</label>
          <input id="title" name="title" required />
        </div>
        <div>
          <label for="summary">Summary</label>
          <input id="summary" name="summary" required />
        </div>
        <div class="row">
          <div>
            <label for="slug">Slug (optional)</label>
            <input id="slug" name="slug" placeholder="auto-from-title" />
          </div>
          <div>
            <label for="author">Author</label>
            <input id="author" name="author" value="Rylo Labz" />
          </div>
        </div>
        <div>
          <label for="content">Article Content</label>
          <textarea id="content" name="content" required></textarea>
        </div>
        <button type="submit">Publish Article</button>
      </form>
      <div id="result"></div>
    </section>
  </main>

  <script>
    const form = document.getElementById('article-form');
    const result = document.getElementById('result');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      result.textContent = 'Publishing...';

      const data = new FormData(form);
      const payload = {
        title: data.get('title'),
        summary: data.get('summary'),
        slug: data.get('slug'),
        author: data.get('author'),
        content: data.get('content')
      };

      try {
        const response = await fetch('/api/articles', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${String(data.get('token') || '')}`
          },
          body: JSON.stringify(payload)
        });

        const body = await response.json();
        if (!response.ok) {
          result.textContent = `Error: ${body.error || 'Failed to publish'}`;
          return;
        }

        const slug = body.article.slug;
        result.innerHTML = `Published successfully.\nOpen: <a href="/article?slug=${encodeURIComponent(slug)}">/article?slug=${slug}</a>`;
        form.reset();
      } catch (error) {
        result.textContent = 'Error: network or server issue while publishing.';
      }
    });
  </script>
</body>
</html>
