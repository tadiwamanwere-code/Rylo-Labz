<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article | Rylo Labz</title>
  <link rel="icon" href="/logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=5" />
  <style>
    body { background: var(--bg); }
    .article-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: clamp(48px, 8vw, 96px) var(--s-6) var(--s-20);
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: var(--fs-small);
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 2px;
      margin-bottom: var(--s-8);
      width: fit-content;
    }
    .back-link:hover { color: var(--text); border-color: var(--text); }
    .article-meta {
      font-family: var(--font-sans);
      color: var(--text-muted);
      font-size: var(--fs-micro);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: var(--s-3);
    }
    #title {
      font-family: var(--font-serif);
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.05;
      letter-spacing: -0.02em;
      margin: 0 0 var(--s-4);
    }
    #summary {
      color: var(--text-muted);
      font-size: var(--fs-body-lg);
      line-height: 1.6;
      margin: 0 0 var(--s-8);
    }
    #content {
      white-space: pre-wrap;
      line-height: 1.8;
      font-size: var(--fs-body-lg);
      color: var(--text-2);
    }
    #content a { color: var(--c-brand-purple); border-bottom: 1px solid currentColor; }
    hr.article-sep {
      border: 0;
      height: 1px;
      background: var(--border);
      margin: var(--s-8) 0;
    }
  </style>
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a href="/" class="brand">
                <span>Rylo Labz</span>
      </a>
      <nav class="nav-links" aria-label="Primary">
        <a href="/#products">Products</a>
        <a href="/#solutions">Solutions</a>
        <a href="/#why">Why Rylo</a>
        <a href="/#resources">Resources</a>
        <a href="/founders.html">Founders</a>
      </nav>
      <a href="/#contact" class="btn btn--brand btn--sm nav-cta">
        <span>Start a project</span>
      </a>
    </div>
  </header>

  <main class="article-wrap">
    <a href="/#resources" class="back-link">← Back to resources</a>
    <article>
      <div id="meta" class="article-meta">Loading…</div>
      <h1 id="title">Please wait</h1>
      <p id="summary"></p>
      <hr class="article-sep" />
      <div id="content"></div>
    </article>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">
                <span>Rylo Labz</span>
      </div>
      <nav class="footer-links" aria-label="Footer">
        <a href="/#products">Products</a>
        <a href="/#solutions">Solutions</a>
        <a href="/founders.html">Founders</a>
        <a href="/#contact">Contact</a>
      </nav>
      <span class="footer-copy">© 2026 Rylo Labz · Bulawayo, Zimbabwe</span>
    </div>
  </footer>

  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');
    const titleEl = document.getElementById('title');
    const summaryEl = document.getElementById('summary');
    const contentEl = document.getElementById('content');
    const metaEl = document.getElementById('meta');

    function friendlyDate(iso) {
      const d = new Date(iso || '');
      if (Number.isNaN(d.getTime())) return 'Rylo Labz';
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    async function load() {
      if (!slug) {
        titleEl.textContent = 'Article not found';
        metaEl.textContent = 'Missing slug';
        return;
      }

      try {
        const response = await fetch(`/api/articles?slug=${encodeURIComponent(slug)}`, {
          headers: { Accept: 'application/json' }
        });
        const body = await response.json();
        if (!response.ok || !body.article) {
          titleEl.textContent = 'Article not found';
          metaEl.textContent = 'Unavailable';
          return;
        }

        const article = body.article;
        document.title = `${article.title} | Rylo Labz`;
        titleEl.textContent = article.title;
        summaryEl.textContent = article.summary || '';
        contentEl.textContent = article.content || '';
        metaEl.textContent = `${friendlyDate(article.publishedAt)} · ${article.author || 'Rylo Labz'}`;
      } catch {
        titleEl.textContent = 'Could not load article';
        metaEl.textContent = 'Temporary issue';
      }
    }

    load();
  </script>
</body>
</html>
